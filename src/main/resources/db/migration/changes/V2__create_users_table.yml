databaseChangeLog:
  - changeSet:
      id: V2__create_users_table
      author: mar
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uk_users_email
            tableName: users
            columnNames: email
        - addUniqueConstraint:
            constraintName: uk_users_phone_number
            tableName: users
            columnNames: phone_number
        - createIndex:
            indexName: idx_users_email
            tableName: users
            columns:
              - column:
                  name: email